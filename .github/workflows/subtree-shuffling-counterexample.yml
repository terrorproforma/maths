name: Verify subtree-shuffling counterexample

on:
  push:
    paths:
      - 'subtree-shuffling-counterexample/**'
      - '.github/workflows/subtree-shuffling-counterexample.yml'
  pull_request:
    paths:
      - 'subtree-shuffling-counterexample/**'
      - '.github/workflows/subtree-shuffling-counterexample.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: subtree-shuffling-counterexample/pyproject.toml

      - name: Install verifier
        working-directory: subtree-shuffling-counterexample
        run: python -m pip install --upgrade pip && python -m pip install -e '.[test]'

      - name: Run exact symbolic verification
        working-directory: subtree-shuffling-counterexample
        run: python -m shuffle_counterexample.verify --strict

      - name: Run tests
        working-directory: subtree-shuffling-counterexample
        run: pytest -q

      - name: Compile manuscript
        uses: xu-cheng/latex-action@v4
        with:
          working_directory: subtree-shuffling-counterexample/paper
          root_file: subtree_shuffling_counterexample.tex
          compiler: latexmk
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Upload manuscript PDF
        uses: actions/upload-artifact@v4
        with:
          name: subtree-shuffling-counterexample-paper
          path: subtree-shuffling-counterexample/paper/subtree_shuffling_counterexample.pdf
          if-no-files-found: error

      - name: Commit compiled PDF to the review branch
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f subtree-shuffling-counterexample/paper/subtree_shuffling_counterexample.pdf
          if git diff --cached --quiet; then
            echo 'Compiled PDF is unchanged.'
          else
            git commit -m 'Build subtree-shuffling manuscript PDF'
            git push
          fi
